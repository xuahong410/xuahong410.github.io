<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miss.X 个人页面</title>
    <style>
        /* ==============================
           Global Styles (全局样式)
           ============================== */
        :root {
            --primary-blue: #48a2f7;
            --background-grey: #f7f9fb;
            --text-grey-light: #888;
            --text-grey-dark: #555;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--background-grey);
            color: #333;
            line-height: 1.5;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul, ol {
            list-style: none;
        }

        /* ==============================
           Header Section (头部区域)
           ============================== */
        header {
            background-color: var(--primary-blue);
            height: 320px;
            width: 100%;
            position: relative;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 50px;
            color: white;
            font-size: 14px;
        }

        .logo {
            font-weight: bold;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links li {
            cursor: pointer;
        }

        .header-title {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 46px;
            font-weight: 220;
            letter-spacing: 3px;
        }

        /* ==============================
           Main Content Layout (主内容布局)
           ============================== */
        main {
            width: 82%;
            max-width: 1150px;
            margin: -40px auto 70px;
            display: flex;
            gap: 22px;
            position: relative;
            z-index: 10;
        }

        .card {
            background-color: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 35px;
        }

        .timeline-column {
            flex: 3;
        }

        .sidebar-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        /* ==============================
           Timeline (时间轴)
           ============================== */
        .timeline-header {
            font-size: 18px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timeline-header::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: var(--primary-blue);
            border-radius: 50%;
        }

        .timeline-content {
            border-left: 2px solid #eaedf0;
            padding-left: 25px;
            position: relative;
        }

        .year-section {
            position: relative;
            margin-bottom: 28px;
        }

        .year-title {
            font-size: 20px;
            color: var(--text-grey-dark);
            margin-bottom: 18px;
        }

        .year-title::before {
            content: '';
            position: absolute;
            left: -34px;
            top: 6px;
            width: 12px;
            height: 12px;
            background-color: white;
            border: 2px solid #eb7e4a;
            border-radius: 50%;
            z-index: 10;
        }

        .article-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 22px;
            position: relative;
        }

        .article-item::before {
            content: '';
            position: absolute;
            left: -32px;
            top: 58px;
            width: 8px;
            height: 8px;
            background-color: #f7f9fb;
            border: 2px solid #eaedf0;
            border-radius: 50%;
            z-index: 10;
        }

        .article-cover {
            width: 110px;
            height: 74px;
            border-radius: 6px;
            overflow: hidden;
            margin-right: 18px;
            background-color: #eaeef2;
            flex-shrink: 0;
        }

        .article-cover img {
            width: 104%;
            height: 106%;
            object-fit: cover;
        }

        .article-details {
            flex: 1;
        }

        .article-date {
            font-size: 13px;
            color: var(--text-grey-light);
            margin-bottom: 6px;
            margin-top: 2px;
        }

        .article-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .article-link {
            border: 1px solid #f6b4a3;
            padding: 4px 10px;
            border-radius: 4px;
            color: var(--text-grey-dark);
            display: inline-block;
            cursor: pointer;
            font-size: 14px;
        }

        .article-link:hover {
            background-color: #fff1ed;
        }

        .music-details {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            margin-bottom: 18px;
        }

        /* ==============================
           Pagination (分页)
           ============================== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eaedf0;
        }

        .page-btn {
            padding: 6px 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            background: white;
            transition: all 0.2s;
        }

        .page-btn:hover {
            background: #f0f4f8;
            border-color: #bbb;
        }

        .page-btn.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ==============================
           Profile Card (个人资料卡)
           ============================== */
        .profile-card {
            text-align: center;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 49%;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin: 0 auto 12px;
            background-color: #eaeef2;
        }

        .avatar img {
            width: 103%;
            height: 103%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .profile-desc {
            font-size: 12px;
            color: var(--text-grey-light);
            margin-bottom: 22px;
        }

        .stat-container {
            display: flex;
            justify-content: space-around;
            width: 97%;
            margin-bottom: 22px;
            gap: 10px;
        }

        .stat-item {
            flex: 1;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-grey-light);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 490;
        }

        .github-icon {
            display: block;
            margin: 0 auto;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .github-icon svg {
            width: 98%;
            height: 98%;
            fill: var(--text-grey-dark);
        }

        /* ==============================
           Notice Card (公告)
           ============================== */
        .notice-card {
            color: var(--text-grey-dark);
            font-size: 13px;
        }

        .notice-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            font-weight: 480;
            color: #333;
        }

        .notice-title::before {
            content: '📢';
            color: #eb7e4a;
        }

        .notice-text {
            color: var(--text-grey-light);
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        /* ==============================
           Music Floating Bar (音乐浮窗)
           ============================= */
        .music-bar {
            position: fixed;
            bottom: 20px;
            left: 18px;
            width: 156px;
            background-color: var(--primary-blue);
            color: white;
            border-radius: 8px;
            padding: 7px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            font-size: 12px;
            z-index: 92;
        }

        .music-controls {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 4px;
        }

        .back-btn {
            position: fixed;
            bottom: 20px;
            right: 18px;
            background-color: white;
            border: 1px solid #ddd;
            width: 41px;
            height: 41px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-grey-light);
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            z-index: 86;
        }
    </style>
</head>
<body>

    <!-- Header & Top Nav -->
    <header>
        <div class="top-nav">
            <div class="logo">Miss.X</div>
            <ul class="nav-links">
                <li>🏠 首页</li>
                <li>📅 时间轴</li>
                <li>🏷️ 标签</li>
                <li>📁 分类</li>
                <li>🔗 友链</li>
                <li>💬 留言板</li>
            </ul>
        </div>
        <div class="header-title">时间轴</div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Left: Timeline Section -->
        <section class="timeline-column card">
            <div class="timeline-header">
                文章总览 - <span id="totalCount">11</span>
            </div>

            <div class="timeline-content" id="timelineContainer">
                <!-- 动态渲染的列表会出现在这里 -->
            </div>

            <!-- 分页区域 -->
            <div class="pagination" id="paginationContainer">
                <!-- 分页按钮由 JS 生成 -->
            </div>
        </section>

        <!-- Right: Sidebar -->
        <aside class="sidebar-column">
            <!-- Profile Card -->
            <div class="profile-card card">
                <div class="avatar">
                    <img src="xu.jpg" alt="头像">
                </div>
                <div class="profile-name">Miss.X</div>
                <div class="profile-desc">自学的笔记</div>
                
                <div class="stat-container">
                    <div class="stat-item">
                        <div class="stat-label">文章</div>
                        <div class="stat-value">11</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">标签</div>
                        <div class="stat-value">11</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">分类</div>
                        <div class="stat-value">2</div>
                    </div>
                </div>

                <a href="#" class="github-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.111.825-.261.825-.579 0-.285-.011-1.041-.015-2.043-3.338.726-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.606-.015 2.898-.015 3.293 0 .322.218.694.825.576C20.565 21.795 24 17.308 24 12c0-6.63-5.37-12-12-12z"/></svg>
                </a>
            </div>

            <!-- Notice Card -->
            <div class="notice-card card">
                <div class="notice-title">公告</div>
                <div class="notice-text">
                    喜欢瞎搞的 🦊 🙈 打工人。
                </div>
            </div>
        </aside>
    </main>

    <div class="back-btn">></div>

    <script>
        // =============================================
        // 1. 数据定义（11条示例数据）
        // =============================================
        const articles = [
            
           
            // { year: 2026, date: '2026-01-05', title: 'WebSocket 心跳重连机制深入解析', icon: '🔌' },
            // { year: 2025, date: '2025-12-25', title: 'nginx与frp的内网服务器实战', icon: '🌐' },
            // { year: 2025, date: '2025-11-18', title: '服务器集群自动化部署(一)之基础环境搭建与应用服务编排', icon: '🚀' },
            // { year: 2025, date: '2025-11-15', title: '记一次 Linux 服务器网络阻塞排查实战', icon: '🐧' },
            // { year: 2025, date: '2025-10-20', title: 'Docker Compose 多环境配置技巧', icon: '🐳' },
            // { year: 2025, date: '2025-09-12', title: 'Git 工作流与分支管理最佳实践', icon: '🔀' },
            // { year: 2025, date: '2025-08-04', title: '前端性能优化之懒加载与代码分割', icon: '⚡' },
            // { year: 2025, date: '2025-07-22', title: 'MySQL 慢查询分析与索引优化实战', icon: '🗄️' },
            // { year: 2025, date: '2025-06-30', title: 'Redis 缓存策略与常见问题排查', icon: '📦' },
            { year: 2026, date: '2026-07-09', title: 'vue3中使用univer', icon: '🖥️',url:'files/vue3中使用univer.htm' },
            { year: 2026, date: '2026-07-08', title: '前端实现滚动缓冲加载', icon: '📊',url:'files/huan_chong.htm' },
        ];

        // =============================================
        // 2. 分页配置
        // =============================================
        const PAGE_SIZE = 10; // 每页10条
        let currentPage = 1;

        // =============================================
        // 3. 渲染函数
        // =============================================
        function renderTimeline(page) {
            const container = document.getElementById('timelineContainer');
            
            // 计算当前页的数据范围
            const startIdx = (page - 1) * PAGE_SIZE;
            const endIdx = Math.min(startIdx + PAGE_SIZE, articles.length);
            const pageArticles = articles.slice(startIdx, endIdx);

            // 按年份分组
            const groupedByYear = {};
            pageArticles.forEach(article => {
                if (!groupedByYear[article.year]) {
                    groupedByYear[article.year] = [];
                }
                groupedByYear[article.year].push(article);
            });

            // 构建 HTML
            let html = '';
            
            // 按年份降序排列（最近的在前面）
            const years = Object.keys(groupedByYear).sort((a, b) => b - a);
            
            years.forEach(year => {
                html += `
                    <div class="year-section">
                        <div class="year-title">${year}</div>
                `;

                groupedByYear[year].forEach(article => {
                    html += `
                        <div class="article-item">
                            <div class="article-cover">
                                <div style="width:100%;height:100%;background:#eaeef2;display:flex;align-items:center;justify-content:center;font-size:32px;">${article.icon}</div>
                            </div>
                            <div class="article-details">
                                <div class="article-date">📅 ${article.date}</div>
                                <div class="article-title" style="color:blue"><a href="${article.url}">${article.title}</a></div>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
            });

            container.innerHTML = html;
            
            // 更新总文章数
            document.getElementById('totalCount').textContent = articles.length;
            
            // 渲染分页按钮
            renderPagination();
        }

        // =============================================
        // 4. 分页按钮渲染
        // =============================================
        function renderPagination() {
            const container = document.getElementById('paginationContainer');
            const totalPages = Math.ceil(articles.length / PAGE_SIZE);
            
            let html = '';
            
            // 上一页按钮
            html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹ 上一页</button>`;
            
            // 页码按钮
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            // 下一页按钮
            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页 ›</button>`;
            
            container.innerHTML = html;
        }

        // =============================================
        // 5. 翻页函数
        // =============================================
        function goToPage(page) {
            const totalPages = Math.ceil(articles.length / PAGE_SIZE);
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            renderTimeline(currentPage);
            
            // 滚动到时间轴顶部
            document.querySelector('.timeline-column').scrollIntoView({ behavior: 'smooth' });
        }

        // =============================================
        // 6. 初始化
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            renderTimeline(1);
        });
    </script>

</body>
</html>
