<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miss.X 个人页面</title>
    <style>
        /* ==============================
           Global Styles
           ============================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            /* 背景图片：可替换为你喜欢的图片地址 */
            background-image: url('img/bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul, ol {
            list-style: none;
        }

        /* ==============================
           Top Navigation (右上角菜单)
           ============================== */
        .top-nav {
            position: fixed;
            top: 0;
            right: 0;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px 40px;
            color: white;
            font-size: 15px;
            z-index: 999;
            /* 半透明背景增强可读性 */
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(6px);
            border-radius: 0 0 0 20px;
        }

        .logo {
            font-weight: bold;
            font-size: 19px;
            margin-right: 30px;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links li {
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .nav-links li:hover {
            opacity: 0.75;
        }

        /* ==============================
           Center greeting (optional)
           ============================== */
        .center-text {
            position: absolute;
            top: 47%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            pointer-events: none;
        }

        .center-text h1 {
            font-size: 64px;
            font-weight: 260;
            letter-spacing: 6px;
            margin-bottom: 12px;
        }

        .center-text p {
            font-size: 18px;
            font-weight: 340;
            letter-spacing: 2px;
            opacity: 0.85;
        }

        /* ==============================
           Responsive fine-tune
           ============================== */
        @media (max-width: 720px) {
            .top-nav {
                padding: 14px 20px;
                font-size: 13px;
                flex-wrap: wrap;
                gap: 6px;
            }
            .logo {
                margin-right: 16px;
                font-size: 16px;
            }
            .nav-links {
                gap: 14px;
            }
            .center-text h1 {
                font-size: 40px;
            }
            .center-text p {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- 右上角菜单 -->
    <div class="top-nav">
        <div class="logo">Miss.X</div>
        <ul class="nav-links">
            <li><a href="/index">🏠 首页</a></li>
            <li><a href="/index1">📅 时间轴</a></li>
            <li><a href="/index1">🏷️ 标签</a></li>
            <li><a href="/index1">📁 分类</a></li>
            <li><a href="/index1">🔗 友链</a></li>
            <li><a href="/index1">💬 留言板</a></li>
        </ul>
    </div>

    <!-- 居中装饰文字（可选，如不需要可删除此区域） -->
    <div class="center-text">
        <h1>Miss.X</h1>
        <p>自学的笔记 · 喜欢瞎搞的打工人</p>
    </div>

</body>
</html>
